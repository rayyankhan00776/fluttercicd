name: Flutter CI

on:
  push:

jobs:
  flutter_ci:
    name: Flutter CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Project
        run: flutter analyze
